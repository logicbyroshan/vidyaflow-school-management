version: "3.9"

services:
  # ─── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vidyaflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vidyaflow_db}
      POSTGRES_USER: ${POSTGRES_USER:-vidyaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidyaflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vidyaflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: development
    container_name: vidyaflow-backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: development
    container_name: vidyaflow-celery
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --concurrency=4
    volumes:
      - ./apps/backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  # ─── Celery Beat ────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: development
    container_name: vidyaflow-celery-beat
    restart: unless-stopped
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./apps/backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # ─── Web (Frontend) ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: development
    container_name: vidyaflow-web
    restart: unless-stopped
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8000/api/v1

volumes:
  postgres_data:
  redis_data:
  media_data:
